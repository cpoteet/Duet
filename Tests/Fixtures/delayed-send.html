<!doctype html>
<html><body>
<div contenteditable="true" role="textbox"></div><button aria-label="Send" disabled>Send</button>
<script>
const composer = document.querySelector('[contenteditable]');
const button = document.querySelector('button');
setTimeout(() => { button.disabled = false; }, 250);
button.addEventListener('click', () => {
  const message = document.createElement('div');
  message.dataset.testid = 'user-message';
  message.textContent = composer.innerText;
  document.body.appendChild(message);
  composer.textContent = '';
});
</script>
</body></html>
